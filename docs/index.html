<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghibli Clouds WebGL</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #334155, #020617 60%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    main {
      width: min(95vw, 1280px);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    p {
      margin: 0 0 1rem;
      opacity: 0.8;
    }

    #unity-canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    #status {
      margin-top: 0.75rem;
      min-height: 1.25rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ghibli Clouds (WebGL)</h1>
    <p>Unity WebGL build host page</p>
    <canvas id="unity-canvas" aria-label="Unity WebGL game canvas"></canvas>
    <div id="status">Loading...</div>
  </main>

  <script>
    const status = document.getElementById("status");
    const canvas = document.getElementById("unity-canvas");
    const siteConfig = {
      buildPath: "Build",
      fileStem: "ghibli-clouds",
      companyName: "VarshaDanduri",
      displayName: "Ghibli Clouds",
      productVersion: "1.0.0"
    };

    const loaderUrl = `${siteConfig.buildPath}/${siteConfig.fileStem}.loader.js`;
    const config = {
      dataUrl: `${siteConfig.buildPath}/${siteConfig.fileStem}.data`,
      frameworkUrl: `${siteConfig.buildPath}/${siteConfig.fileStem}.framework.js`,
      codeUrl: `${siteConfig.buildPath}/${siteConfig.fileStem}.wasm`,
      streamingAssetsUrl: "StreamingAssets",
      companyName: siteConfig.companyName,
      productName: siteConfig.displayName,
      productVersion: siteConfig.productVersion
    };

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        status.textContent = `Loading ${(progress * 100).toFixed(0)}%`;
      }).then(() => {
        status.textContent = "Ready";
      }).catch((error) => {
        status.textContent = "Failed to load WebGL build. Check console for details.";
        console.error(error);
      });
    };
    script.onerror = () => {
      status.textContent = "WebGL build files not found. See the repository README for build instructions.";
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
